<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Dégradé or métallique premium -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7A35B" />
      <stop offset="50%" stop-color="#E8C878" />
      <stop offset="100%" stop-color="#713B2B" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Forme géométrique marocaine (Octogone étoilé discret) -->
  <path d="M 50 5 L 63 18 L 81 18 L 81 36 L 94 49 L 81 62 L 81 80 L 63 80 L 50 93 L 37 80 L 19 80 L 19 62 L 6 49 L 19 36 L 19 18 L 37 18 Z" 
        fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.65" />

  <!-- Symbole de la Flamme intégrée (Grillade) -->
  <path d="M 50 25 C 55 35, 62 40, 60 52 C 58 64, 42 64, 40 52 C 38 40, 45 35, 50 25 Z" 
        fill="url(#goldGrad)" opacity="0.25" />

  <!-- Lettre R stylisée et élégante -->
  <path d="M 38 28 H 52 C 60 28, 62 34, 52 38 H 38 V 28 Z M 38 38 H 48 C 55 38, 58 45, 60 62 M 38 28 V 65" 
        fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
